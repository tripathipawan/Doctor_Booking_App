<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./src/assets/doctor_icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appoint Your Doctor — Book Top Doctors Near You Instantly</title>
  <meta name="description"
    content="Book verified doctors online in under 2 minutes. 40+ trusted specialists across 10 specialities — General Physician, Gynecologist, Dermatologist, Neurologist & more. Real-time slots, instant confirmation, no hidden fees." />
  <meta name="author" content="Appoint Your Doctor" />
  <meta name="keywords"
    content="doctor booking India, online doctor appointment, specialist consultation, physician near me, book dermatologist, gynecologist appointment, healthcare platform India, instant doctor booking" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta property="og:title" content="Appoint Your Doctor — Book Top Doctors Near You Instantly" />
  <meta property="og:description"
    content="40+ verified specialists. Book in under 2 minutes. Real-time availability, instant confirmation, no hidden fees." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://appoint-your-doctor.vercel.app" />
  <meta property="og:image" content="https://appoint-your-doctor.vercel.app/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Appoint Your Doctor – Book Top Doctors Near You" />
  <meta property="og:site_name" content="Appoint Your Doctor" />
  <meta property="og:locale" content="en_IN" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Appoint Your Doctor — Book Top Doctors Near You" />
  <meta name="twitter:description"
    content="40+ verified specialists. Book in under 2 minutes. Instant confirmation, no hidden fees." />
  <meta name="twitter:image" content="https://appoint-your-doctor.vercel.app/og-image.jpg" />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="color-scheme" content="light dark" />
  <link rel="canonical" href="https://appoint-your-doctor.vercel.app/" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MedicalOrganization",
    "name": "Appoint Your Doctor",
    "url": "https://appoint-your-doctor.vercel.app",
    "logo": "https://appoint-your-doctor.vercel.app/src/assets/logo.svg",
    "description": "India's trusted online doctor booking platform. Book appointments with 40+ verified specialists across 10 medical specialities instantly.",
    "medicalSpecialty": [
      "General Physician","Gynecology","Dermatology","Pediatrics",
      "Neurology","Gastroenterology","Cardiology","Orthopedics","Psychiatry","Ophthalmology"
    ],
    "address": { "@type": "PostalAddress", "addressCountry": "IN" },
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "availableLanguage": ["English", "Hindi"]
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "4.9",
      "reviewCount": "50000",
      "bestRating": "5"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Appoint Your Doctor",
    "url": "https://appoint-your-doctor.vercel.app",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://appoint-your-doctor.vercel.app/alldoctors?search={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How do I book a doctor appointment online?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Visit Appoint Your Doctor, search by speciality or doctor name, choose an available time slot, and confirm your booking. The entire process takes under 2 minutes."
        }
      },
      {
        "@type": "Question",
        "name": "Which specialities are available on Appoint Your Doctor?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We offer 10 specialities: General Physician, Gynecologist, Dermatologist, Pediatricians, Neurologist, Gastroenterologist, Cardiologist, Orthopedic, Psychiatrist, and Ophthalmologist."
        }
      },
      {
        "@type": "Question",
        "name": "Are the doctors on this platform verified?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. All 40+ doctors on Appoint Your Doctor are 100% verified, licensed, and experienced specialists."
        }
      },
      {
        "@type": "Question",
        "name": "Is there any booking fee or hidden charges?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Booking through Appoint Your Doctor is completely free with no hidden fees. You only pay the doctor's consultation fee."
        }
      },
      {
        "@type": "Question",
        "name": "Can I cancel or reschedule my appointment?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, you can cancel appointments anytime through your My Appointments dashboard."
        }
      }
    ]
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://appoint-your-doctor.vercel.app/" }
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" />
  </noscript>
  <meta name="application-name" content="Appoint Your Doctor" />
</head>
